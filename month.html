<!doctype html>
<html lang="zh-Hant">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="theme.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="What I Spend">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>本月</title>

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;background:var(--app-bg, #f2ede9);color:var(--text, #3c3c3c);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    }

    .app{min-height:100vh;padding-bottom:var(--tab-height)}
    .page{max-width:520px;margin:0 auto;padding:18px var(--page-padding, 16px) 28px}

    /* ✅ Header：抽屜(左) + 標題(中) + 帳本徽章(右) 同高（像 books） */
    .nav{
      display:grid;
      grid-template-columns: 76px 1fr 76px;  /* 左右固定，標題永遠置中 */
      align-items:center;
      height:44px;
      margin-bottom:10px;
    }
    .nav-left{
      justify-self:start;
      width:76px;
      display:flex;
      align-items:center;
      /* 抽屜按鈕由 app.js 注入在 body（.topbar），這裡只保留佈局 */
    }
    .nav-title{
      justify-self:center;
      margin:0;
      transform:none;
      font-size:28px;
      font-weight:800;
      letter-spacing:-.5px;
      text-align:center;
      line-height:1;
    }
    /* 右上角徽章使用 theme.css 的 .book-badge，但在本頁改成跟 header 同高 */
    .book-badge{
      position: static !important;
      top:auto !important;
      right:auto !important;

      justify-self:end;
      width:76px;              /* ✅ 固定欄寬 => 中間真置中 */
      max-width:76px;

      padding:7px 10px;        /* 微調高度感 */
      line-height:1;

      display:flex;
      align-items:center;
      justify-content:flex-end;
    }

    .monthbar{
      margin-top:8px;
      background: var(--card-bg);
      border-radius: var(--radius);
      padding:10px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .monthbar .m-btn{
      border:0;
      background: transparent;
      padding:10px 12px;
      border-radius:12px;
      font-weight:900;
      color: var(--accent-text, #007aff);
      cursor:pointer;
      appearance:none;
      -webkit-appearance:none;
    }
    .monthbar .m-title{
      font-weight:900;
      letter-spacing:-.2px;
      color: var(--text);
      white-space:nowrap;
    }

    .section{margin-top:18px}
    .card{background:var(--card-bg);border-radius:var(--radius);padding:16px}
    .rows{display:grid;gap:10px;font-size:18px}
    .row{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .v.green{color:var(--green);font-weight:800}
    .v.red{color:var(--red);font-weight:800}

    .day-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-size:18px;
      font-weight:800;
      color:var(--secondary);
      margin:14px 0 8px;
      padding-top:6px;
      padding-bottom:2px;
      gap:12px;
    }
    .day-total{
      font-weight:900;
      color:var(--secondary);
      white-space:nowrap;
      font-size:14px;
    }
    .day-total .v{font-weight:900;font-size:14px}
    .day-total .v.green{ color:var(--green); }
    .day-total .v.red{ color:var(--red); }

    .day-card{background:var(--card-bg);border-radius:var(--radius);overflow:hidden}

    .tx{
      display:grid;grid-template-columns:1fr auto;gap:12px;
      padding:14px 16px;text-decoration:none;color:var(--text);
      position:relative;
    }
    .cat{font-size:20px;font-weight:700;line-height:1.2}
    .note{margin-top:4px;font-size:14px;color:var(--secondary)}
    .right{text-align:right;display:grid;gap:4px;min-width:90px}
    .amt{font-size:20px;font-weight:800}
    .time{font-size:14px;color:var(--secondary)}
    .divider{height:1px;background:var(--divider);border:0;margin:0}

    .empty{
      margin-top:18px;
      background:rgba(255,255,255,0.5);
      border:1px solid rgba(0,0,0,0.06);
      border-radius:var(--radius);
      padding:14px 16px;
      color:var(--secondary);
      font-weight:800;
    }
  </style>
</head>

<body>
  <div class="app">
    <main class="page">
      <!-- ✅ 上排同高：抽屜 / 標題 / 帳本 -->
      <div class="nav">
        <div class="nav-left"></div>
        <div class="nav-title">本月</div>
        <div class="book-badge" id="bookBadge" style="display:none;"></div>
      </div>

      <div class="monthbar" aria-label="月份切換">
        <button class="m-btn" type="button" id="btnPrev" aria-label="上一月">&lt;</button>
        <div class="m-title"><span id="monthLabel">Loading...</span></div>
        <button class="m-btn" type="button" id="btnNext" aria-label="下一月">&gt;</button>
      </div>

      <section class="section">
        <div class="card">
          <div class="rows">
            <div class="row"><div>收入</div><div class="v green" id="sum-income">0</div></div>
            <div class="row"><div>支出</div><div class="v red" id="sum-expense">0</div></div>
            <div class="row"><div>結餘</div><div class="v red" id="sum-balance">0</div></div>
          </div>
        </div>
      </section>

      <div id="list-root"></div>
    </main>

    <nav class="tabbar" aria-label="Tab Bar">
      <div class="tabbar-inner">
        <button class="tab" type="button" data-href="add.html"><div class="icon">＋</div><div>新增</div></button>
        <button class="tab" type="button" data-href="month.html"><div class="icon">▦</div><div>本月</div></button>
        <button class="tab" type="button" data-href="year.html"><div class="icon">⛁</div><div>統計</div></button>
      </div>
    </nav>
  </div>

  <script type="module" src="app.js"></script>

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import {
      collection, query, where, getDocs, orderBy, limit, addDoc, serverTimestamp,
      doc, getDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { db } from "./firebase-config.js";

    await window.firebaseReady;

    // =========================
    // Book / Month State
    // =========================
    const LS_BOOK = "wis_currentBookId";
    const qs = new URLSearchParams(location.search);
    const urlBook = qs.get("b");
    if (urlBook) localStorage.setItem(LS_BOOK, urlBook);

    const pad2 = (n) => String(n).padStart(2, "0");
    const monthKeyFromDate = (d) => `${d.getFullYear()}-${pad2(d.getMonth() + 1)}`;

    const parseMonthKey = (key) => {
      if (!key || !/^\d{4}-\d{2}$/.test(key)) return null;
      const [y, m] = key.split("-").map((n) => parseInt(n, 10));
      if (!y || !m || m < 1 || m > 12) return null;
      return new Date(y, m - 1, 1);
    };

    const addMonths = (d, delta) => new Date(d.getFullYear(), d.getMonth() + delta, 1);
    const monthLabel = (d) => `${d.getFullYear()}-${pad2(d.getMonth() + 1)}`;

    let currentMonth = parseMonthKey(qs.get("m")) || new Date(new Date().getFullYear(), new Date().getMonth(), 1);
    const currentKey = monthKeyFromDate(currentMonth);
    document.getElementById("monthLabel").textContent = monthLabel(currentMonth);

    // ✅ 帶上 b 參數（如果有）
    const currentBookIdFromLS = () => localStorage.getItem(LS_BOOK) || "";
    const buildMonthUrl = (mKey) => {
      const b = currentBookIdFromLS();
      return `month.html?m=${mKey}` + (b ? `&b=${encodeURIComponent(b)}` : "");
    };

    document.getElementById("btnPrev").addEventListener("click", () => {
      const prev = addMonths(currentMonth, -1);
      location.href = buildMonthUrl(monthKeyFromDate(prev));
    });
    document.getElementById("btnNext").addEventListener("click", () => {
      const next = addMonths(currentMonth, 1);
      location.href = buildMonthUrl(monthKeyFromDate(next));
    });

    // edit 回來用的 ref（保留原功能）
    const currentRef = buildMonthUrl(currentKey);

    // =========================
    // Ensure default book
    // =========================
    async function ensureDefaultBook(uid){
      const existing = currentBookIdFromLS();
      if (existing) return existing;

      const booksRef = collection(db, "users", uid, "books");
      const q1 = query(booksRef, orderBy("createdAt","asc"), limit(1));
      const snap = await getDocs(q1);

      if (!snap.empty) {
        const firstId = snap.docs[0].id;
        localStorage.setItem(LS_BOOK, firstId);
        return firstId;
      }

      const docRef = await addDoc(booksRef, {
        name: "生活",
        archived: false,
        createdAt: serverTimestamp(),
      });
      localStorage.setItem(LS_BOOK, docRef.id);
      return docRef.id;
    }

    // =========================
    // Book badge (top-right in header)
    // =========================
    async function showBookBadge(uid){
      const badge = document.getElementById("bookBadge");
      if (!badge) return;

      const bookId = currentBookIdFromLS();
      if (!bookId) { badge.style.display = "none"; return; }

      try{
        const bookRef = doc(db, "users", uid, "books", bookId);
        const snap = await getDoc(bookRef);
        const name = (snap.data()?.name || "未命名帳本").trim();

        badge.textContent = name;
        badge.title = name;
        badge.style.display = "flex";
      }catch(e){
        console.warn("showBookBadge failed:", e);
        badge.style.display = "none";
      }
    }

    // =========================
    // Helpers
    // =========================
    const formatTime12h = (hhmm) => {
      if(!hhmm) return "";
      const [hStr, mStr] = hhmm.split(":");
      let h = parseInt(hStr,10);
      const m = parseInt(mStr,10);
      const ampm = h >= 12 ? "PM" : "AM";
      h = h % 12; if(h === 0) h = 12;
      return `${h}:${pad2(m)} ${ampm}`;
    };

    const ymdToDate = (ymd) => {
      if(!ymd) return null;
      const [y,m,d] = ymd.split("-").map(n => parseInt(n,10));
      if(!y || !m || !d) return null;
      return new Date(y, m-1, d);
    };

    const formatDayHeader = (ymd) => {
      const dt = ymdToDate(ymd);
      if(!dt) return ymd || "";
      const wd = dt.toLocaleDateString("en-US", { weekday:"short" });
      return `${wd}, ${dt.getMonth()+1}/${dt.getDate()}`;
    };

    const parseAmount = (v) => {
      const n = Number(String(v ?? "").replace(/,/g,""));
      return isFinite(n) ? n : 0;
    };

    const nextMonthKey = (ym) => {
      const [y,m] = ym.split("-").map(n=>parseInt(n,10));
      const d = new Date(y, m-1, 1);
      const next = new Date(d.getFullYear(), d.getMonth()+1, 1);
      return monthKeyFromDate(next);
    };

    // =========================
    // Firestore fetch
    // =========================
    async function fetchMonthTxs(uid){
      const root = document.getElementById("list-root");
      root.innerHTML = "<div class='empty'>讀取中...</div>";

      const bookId = currentBookIdFromLS();
      if (!bookId) {
        location.replace("books.html");
        return [];
      }

      const txRef = collection(db, "users", uid, "transactions");
      const start = `${currentKey}-01`;
      const end = `${nextMonthKey(currentKey)}-01`;

      const q = query(
        txRef,
        where("bookId", "==", bookId),
        where("date", ">=", start),
        where("date", "<", end),
        orderBy("date", "desc"),
        orderBy("time", "desc")
      );

      const snap = await getDocs(q);
      const txs = [];
      snap.forEach(d => txs.push({ id: d.id, ...d.data() }));
      return txs;
    }

    // =========================
    // Rendering
    // =========================
    function buildTxRow(tx){
      const rawAmt = parseAmount(tx.amount);
      const isIncome = tx.type === "income";

      const a = document.createElement("a");
      a.className = "tx";
      a.dataset.id = tx.id;

      const params = new URLSearchParams();
      params.set("id", tx.id);
      params.set("ref", currentRef);
      if(tx.date) params.set("date", tx.date);
      if(tx.time) params.set("time", tx.time);
      params.set("type", tx.type || "expense");
      params.set("amount", String(rawAmt));
      params.set("cat", tx.category || "");
      params.set("note", tx.note || "");
      a.href = "edit.html?" + params.toString();

      const left = document.createElement("div");
      const cat = document.createElement("div");
      cat.className = "cat";
      cat.textContent = tx.category || "";
      left.appendChild(cat);

      const noteTxt = (tx.note || "").trim();
      const note = document.createElement("div");
      note.className = "note";
      if(noteTxt) note.textContent = noteTxt;
      else note.style.display = "none";
      left.appendChild(note);

      const right = document.createElement("div");
      right.className = "right";

      const amt = document.createElement("div");
      amt.className = "amt";
      amt.textContent = isIncome ? `+${rawAmt}` : `-${rawAmt}`;
      amt.style.color = isIncome ? "var(--green)" : "var(--red)";
      right.appendChild(amt);

      const time = document.createElement("div");
      time.className = "time";
      time.textContent = formatTime12h(tx.time || "");
      right.appendChild(time);

      a.append(left, right);
      return a;
    }

    function renderWithTxs(txs){
      const root = document.getElementById("list-root");
      root.innerHTML = "";

      // sums
      let income = 0, expense = 0;
      for(const tx of txs){
        const amt = parseAmount(tx.amount);
        if(tx.type === "income") income += amt;
        else expense += amt;
      }
      const balance = income - expense;

      document.getElementById("sum-income").textContent = String(income);
      document.getElementById("sum-expense").textContent = String(expense);

      const balEl = document.getElementById("sum-balance");
      balEl.textContent = String(balance);
      balEl.classList.remove("green","red");
      balEl.classList.add(balance >= 0 ? "green" : "red");

      if(!txs.length){
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "這個月份還沒有明細，去新增一筆吧！";
        root.appendChild(empty);
        return;
      }

      // group by date
      const groups = new Map();
      for(const tx of txs){
        const key = tx.date || "unknown";
        if(!groups.has(key)) groups.set(key, []);
        groups.get(key).push(tx);
      }

      const dates = Array.from(groups.keys()).sort((a,b) => b.localeCompare(a));
      for(const dateKey of dates){
        const section = document.createElement("section");
        section.className = "section";

        const list = groups.get(dateKey);

        const header = document.createElement("div");
        header.className = "day-header";

        const leftTitle = document.createElement("div");
        leftTitle.textContent = formatDayHeader(dateKey);

        let dayIncome = 0, dayExpense = 0;
        for (const tx of list) {
          const amt = parseAmount(tx.amount);
          if (tx.type === "income") dayIncome += amt;
          else dayExpense += amt;
        }
        const dayNet = dayIncome - dayExpense;

        const rightTotal = document.createElement("div");
        rightTotal.className = "day-total";
        rightTotal.appendChild(document.createTextNode("總計 "));

        const v = document.createElement("span");
        v.className = "v " + (dayNet >= 0 ? "green" : "red");
        v.textContent = String(dayNet);
        rightTotal.appendChild(v);

        header.append(leftTitle, rightTotal);
        section.appendChild(header);

        const card = document.createElement("div");
        card.className = "day-card";

        list.forEach((tx, idx) => {
          card.appendChild(buildTxRow(tx));
          if(idx !== list.length - 1){
            const hr = document.createElement("hr");
            hr.className = "divider";
            card.appendChild(hr);
          }
        });

        section.appendChild(card);
        root.appendChild(section);
      }
    }

    // =========================
    // Auth gate (keep behavior)
    // =========================
    let isInitialCheck = true;

    onAuthStateChanged(window.auth, async (user) => {
      if (user) {
        isInitialCheck = false;

        await ensureDefaultBook(user.uid);
        await showBookBadge(user.uid);

        try {
          const txs = await fetchMonthTxs(user.uid);
          renderWithTxs(txs);
        } catch (e) {
          console.error("讀取失敗:", e);
          document.getElementById("list-root").innerHTML =
            "<div class='empty'>讀取失敗，請確認 Firestore 規則與索引</div>";
        }
      } else {
        if (isInitialCheck) {
          setTimeout(() => {
            if (!window.auth.currentUser) location.replace("index.html");
          }, 1500);
          isInitialCheck = false;
        } else {
          location.replace("index.html");
        }
      }
    });
  </script>
</body>
</html>
