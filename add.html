<!-- =========================
     add.html (已改好)
     ✅ 一開始就有預設清單
     ✅ 新增/設定頁改完會同步
     ✅ 不動你原有存檔/帳本/登入流程
     ✅ 抽屜加「分類設定」入口
     ✅ categories 來源改成 books/{bookId}.categories (唯一來源)
========================= -->
<!doctype html>
<html lang="zh-Hant">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="theme.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="What I Spend">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>新增</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;background:var(--app-bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    }
    .app{min-height:100vh;padding-bottom:var(--tab-height)}
    .page{max-width:520px;margin:0 auto;padding:18px var(--page-padding) 28px}
    .nav-title{font-size:28px;font-weight:800;margin:0px 0 14px;transform: translateY(-4px);letter-spacing:-.5px;text-align:center}
    .section{margin-top:18px}
    .label{font-size:14px;font-weight:800;color:var(--secondary);margin:10px 0 8px}
    .card{background:var(--card-bg);border-radius:var(--radius);padding:16px}
    .segment{
      display:grid;grid-template-columns:1fr 1fr;
      background:var(--card-bg);border-radius:12px;padding:4px;
    }
    .seg-btn{
      border:0;background:transparent;padding:10px 0;border-radius:10px;
      font-weight:800;color:var(--secondary);cursor:pointer;
    }
    .seg-btn.active{background:#fff;color:var(--text)}
    .field{display:grid;gap:8px;margin-top:14px}
    .field:first-child{margin-top:0}
    .input, select{
      width:100%;padding:12px 12px;border-radius:10px;border:1px solid rgba(0,0,0,0.12);
      background:#fff;font-size:16px;
    }
    input, select { width:100%; max-width:100%; box-sizing:border-box; }
    input[type="date"]{ display:block; appearance:none; -webkit-appearance:none; }
    .field, .card { min-width:0; }

    .save{
      margin-top:14px;
      width:100%;
      padding:14px 16px;
      border:0;border-radius:16px;
      background: var(--btn-primary-bg, var(--accent-text));
      font-size:18px;font-weight:800;
      cursor:pointer;
      color: var(--btn-primary-text, #fff);
    }

    /* iOS-style tap feedback */
    a, button, .seg-btn, .save, .tab{ -webkit-tap-highlight-color: transparent; }
    .seg-btn, .save, .tab, button{
      user-select:none; -webkit-user-select:none;
      transition: opacity .15s ease, transform .10s ease, background-color .15s ease;
    }
    .seg-btn:active{ opacity:.65; transform:scale(.98); }
    .save:active{ opacity:.65; transform:scale(.98); }
    .tab:active{ opacity:.6; transform:scale(.98); }
    .seg-btn:focus, .save:focus, .tab:focus, button:focus{ outline:none; }

    /* iOS 日期 input 文字顏色（統一控色） */
    input[type="date"]{
      color: var(--accent-text);
      -webkit-text-fill-color: var(--accent-text);
    }
    input[type="date"]::-webkit-datetime-edit{ color: var(--accent-text); }
    input[type="date"]::-webkit-datetime-edit-text,
    input[type="date"]::-webkit-datetime-edit-month-field,
    input[type="date"]::-webkit-datetime-edit-day-field,
    input[type="date"]::-webkit-datetime-edit-year-field{
      color: var(--accent-text);
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Drawer Button -->
    <div class="topbar">
      <button class="hamburger" id="drawerBtn" type="button" aria-label="menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <!-- Drawer Backdrop -->
    <div class="drawer-backdrop drawer-overlay" id="drawerBackdrop" style="display:none;"></div>

    <!-- Drawer Panel -->
    <aside class="drawer drawer-panel" id="drawer">
      <div class="drawer-inner">
        <div class="drawer-title">功能</div>

        <a class="drawer-link" href="month.html"><button class="drawer-item" type="button">本月</button></a>
        <a class="drawer-link" href="add.html"><button class="drawer-item" type="button">新增</button></a>
        <a class="drawer-link" href="year.html"><button class="drawer-item" type="button">統計</button></a>
        <a class="drawer-link" href="books.html?ref=add.html"><button class="drawer-item" type="button">帳本</button></a>

        <!-- ✅ 新增：分類設定入口（不影響其他功能） -->
        <a class="drawer-link" href="categories.html?ref=add.html"><button class="drawer-item" type="button">分類設定</button></a>

        <button class="drawer-item danger" id="logoutBtn" type="button">登出</button>
      </div>
    </aside>

    <main class="page">
      <div class="nav-title">新增</div>

      <!-- 類型 -->
      <section class="section">
        <div class="segment" role="tablist" aria-label="類型">
          <button class="seg-btn active" id="btn-expense" type="button" aria-pressed="true">支出</button>
          <button class="seg-btn" id="btn-income" type="button" aria-pressed="false">收入</button>
        </div>
      </section>

      <!-- 日期/分類/金額/備註 -->
      <section class="section">
        <div class="card">
          <div class="field">
            <div class="label">日期</div>
            <input class="input" type="date" id="date" />
          </div>

          <div class="field">
            <div class="label">分類</div>
            <select class="input" id="category"></select>
          </div>

          <div class="field">
            <div class="label">金額</div>
            <input class="input" type="number" id="amount" inputmode="decimal" placeholder="輸入金額" />
          </div>

          <div class="field">
            <div class="label">備註</div>
            <input class="input" type="text" id="note" placeholder="備註（可空）" />
          </div>
        </div>

        <button class="save" id="saveBtn" type="button">儲存</button>
      </section>
    </main>

    <!-- Tab Bar -->
    <nav class="tabbar" aria-label="Tab Bar">
      <div class="tabbar-inner">
        <button class="tab" href="add.html"><div class="icon">＋</div><div>新增</div></a>
        <button class="tab" href="month.html"><div class="icon">▦</div><div>本月</div></a>
        <button class="tab" href="year.html"><div class="icon">⛁</div><div>統計</div></a>
      </div>
    </nav>
  </div>

  <script type="module" src="app.js"></script>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import {
      addDoc, collection, serverTimestamp,
      getDocs, query, orderBy, limit,
      doc, getDoc, updateDoc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ✅ 帳本
    const LS_BOOK = "wis_currentBookId";

    // ✅ 預設分類（第一次使用會寫進書本）
    const DEFAULT_CATEGORIES = {
      expense: ["餐飲🥣","飲料🥤","交通🛵","日用🛍️","娛樂🎮","醫療🏥","治裝👗","家用🏠","旅遊🧳","其他🧶"],
      income:  ["薪資💼","獎金🎁","兼職🧑‍💻","投資📈","退款💵","其他🧶"],
    };

    async function ensureDefaultBook(uid){
      const existing = localStorage.getItem(LS_BOOK);
      if (existing) return existing;

      const booksRef = collection(db, "users", uid, "books");
      const q1 = query(booksRef, orderBy("createdAt","asc"), limit(1));
      const snap = await getDocs(q1);

      if (!snap.empty) {
        const firstId = snap.docs[0].id;
        localStorage.setItem(LS_BOOK, firstId);
        return firstId;
      }

      // ✅ 新帳本：直接存 categories（使用者一開始就有清單）
      const docRef = await addDoc(booksRef, {
        name: "生活",
        archived: false,
        createdAt: serverTimestamp(),
        categories: DEFAULT_CATEGORIES,
      });
      localStorage.setItem(LS_BOOK, docRef.id);
      return docRef.id;
    }

    // ✅ 從書本讀出 categories（舊帳本沒有就補上）
    let BOOK_CATEGORIES = structuredClone(DEFAULT_CATEGORIES);

    async function loadBookCategories(uid){
      const bookId = localStorage.getItem(LS_BOOK);
      if (!bookId) return;

      const bookRef = doc(db, "users", uid, "books", bookId);
      const snap = await getDoc(bookRef);
      const data = snap.data() || {};
      const c = data.categories;

      const ok =
        c &&
        Array.isArray(c.expense) && c.expense.length &&
        Array.isArray(c.income)  && c.income.length;

      if (ok) {
        BOOK_CATEGORIES = { expense: c.expense, income: c.income };
        return;
      }

      // ✅ 舊帳本：補寫預設 categories
      await updateDoc(bookRef, { categories: DEFAULT_CATEGORIES });
      BOOK_CATEGORIES = structuredClone(DEFAULT_CATEGORIES);
    }

    // =========================
    // Helpers
    // =========================
    const $ = (id) => document.getElementById(id);
    const pad2 = (n) => String(n).padStart(2, "0");

    const todayYMD = () => {
      const d = new Date();
      return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
    };

    const nowHHMM = () => {
      const d = new Date();
      return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    };

    const monthKeyFromDateStr = (ymd) =>
      (ymd && /^\d{4}-\d{2}-\d{2}$/.test(ymd)) ? ymd.slice(0, 7) : "";

    const parseAmount = (v) => {
      const n = Number(String(v ?? "").replace(/,/g, ""));
      return isFinite(n) ? n : NaN;
    };

    const isLocalhost = () =>
      location.hostname === "localhost" || location.hostname === "127.0.0.1";

    // =========================
    // DOM
    // =========================
    const btnExpense = $("btn-expense");
    const btnIncome  = $("btn-income");
    const categorySelect = $("category");
    const dateInput = $("date");
    const amountInput = $("amount");
    const noteInput = $("note");
    const saveBtn = $("saveBtn");

    // =========================
    // State
    // =========================
    let currentType = "expense";
    let uid = null;

    function categoriesFor(type){
      return type === "income" ? BOOK_CATEGORIES.income : BOOK_CATEGORIES.expense;
    }

    // =========================
    // UI: Categories + Type
    // =========================
    function renderCategoryOptions(type) {
      const list = categoriesFor(type);
      const safeList = (Array.isArray(list) && list.length)
        ? list
        : (type === "income" ? DEFAULT_CATEGORIES.income : DEFAULT_CATEGORIES.expense);

      const prev = categorySelect.value;

      categorySelect.innerHTML = "";
      for (const name of safeList) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        categorySelect.appendChild(opt);
      }

      categorySelect.value = safeList.includes(prev) ? prev : safeList[0];
    }

    function setType(type) {
      currentType = (type === "income") ? "income" : "expense";
      const isExpense = currentType === "expense";

      btnExpense.classList.toggle("active", isExpense);
      btnIncome.classList.toggle("active", !isExpense);

      btnExpense.setAttribute("aria-pressed", String(isExpense));
      btnIncome.setAttribute("aria-pressed", String(!isExpense));

      renderCategoryOptions(currentType);
    }

    // =========================
    // Prefill
    // =========================
    dateInput.value = todayYMD();
    setType("expense");

    btnExpense.addEventListener("click", () => setType("expense"));
    btnIncome.addEventListener("click", () => setType("income"));

    // =========================
    // Querystring prefill
    // =========================
    const qs = new URLSearchParams(location.search);
    const qsType = qs.get("type");
    const qsAmount = qs.get("amount");
    const qsCategory = qs.get("category");
    const qsNote = qs.get("note");
    const qsDate = qs.get("date");
    const autoSave = qs.get("autosave") === "1";

    if (qsType === "income" || qsType === "expense") setType(qsType);
    if (qsDate && /^\d{4}-\d{2}-\d{2}$/.test(qsDate)) dateInput.value = qsDate;
    if (qsAmount) amountInput.value = qsAmount;
    if (qsNote) noteInput.value = qsNote;

    // =========================
    // Auth gate (no behavior change)
    // =========================
    await window.firebaseReady;

    const initialUser = await window.waitForAuthReady();
    uid = initialUser?.uid || null;

    if (uid) {
      await ensureDefaultBook(uid);
      await loadBookCategories(uid);
      renderCategoryOptions(currentType);

      // ✅ 若網址有帶 category，等 categories 讀完後再選回去
      if (qsCategory && [...categorySelect.options].some(o => o.value === qsCategory)) {
        categorySelect.value = qsCategory;
      }
    }

    saveBtn.disabled = false;

    async function ensureLoginOrRedirect() {
      const user = await window.waitForAuthReady();
      if (user) return user;

      const next = encodeURIComponent(location.href);
      location.replace(`index.html?next=${next}`);
      return null;
    }

    // =========================
    // Write: function first, fallback to client
    // =========================
    async function addViaFunction(payload) {
      const u = auth.currentUser;
      if (!u) throw new Error("Not logged in");

      const token = await u.getIdToken();
      const res = await fetch("/.netlify/functions/addTransaction", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${token}`,
        },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const text = await res.text();
        console.error("Function error status:", res.status, "body:", text);
        throw new Error(text || `Function failed: ${res.status}`);
      }

      return res.json().catch(() => ({}));
    }

    async function addViaClientFirestore(payload) {
      const u = auth.currentUser;
      if (!u) throw new Error("Not logged in");

      await addDoc(
        collection(db, "users", u.uid, "transactions"),
        { ...payload, createdAt: serverTimestamp() }
      );
    }

    async function writeTransaction(payload, { prefer = "function" } = {}) {
      const u = auth.currentUser;
      if (!u) throw new Error("Not logged in");

      const functionFirst = (prefer === "function") && !isLocalhost();

      if (functionFirst) {
        try {
          await addViaFunction(payload);
          return { via: "function" };
        } catch (e) {
          console.warn("Function write failed; fallback to client Firestore:", e);
          await addViaClientFirestore(payload);
          return { via: "client_fallback" };
        }
      }

      try {
        await addViaClientFirestore(payload);
        return { via: "client" };
      } catch (e) {
        console.warn("Client write failed; fallback to function:", e);
        await addViaFunction(payload);
        return { via: "function_fallback" };
      }
    }

    // =========================
    // Save flow
    // =========================
    async function saveToFirestore({ redirectAfter = true } = {}) {
      const user = await ensureLoginOrRedirect();
      if (!user) return;

      const date = dateInput.value || todayYMD();
      const time = nowHHMM();
      const category = (categorySelect.value || "").trim();
      const note = (noteInput.value || "").trim();
      const amount = parseAmount(amountInput.value);

      if (!category) { await window.ui.alert("請選擇分類"); return; }
      if (!isFinite(amount) || amount <= 0) { await window.ui.alert("請輸入正確金額（> 0）"); return; }

      const bookId = localStorage.getItem("wis_currentBookId");
      if (!bookId) {
        location.replace("books.html");
        return;
      }

      const payload = { bookId, date, time, type: currentType, amount, category, note };

      await writeTransaction(payload, { prefer: "client" });

      if (redirectAfter) {
        const ym = monthKeyFromDateStr(date);
        const b = encodeURIComponent(bookId);
        location.replace(ym ? `month.html?m=${ym}&b=${b}` : `month.html?b=${b}`);
      }
    }

    saveBtn.addEventListener("click", async () => {
      await window.withButtonFeedback(
        saveBtn,
        async () => {
          await saveToFirestore({ redirectAfter: true });
        },
        {
          loadingText: "儲存中…",
          successText: "已儲存 ✓",
          // 你會立刻跳轉，給它至少閃一下比較有感（可調 120~200）
          minShowMs: 120,
          successHoldMs: 800,
          onError: (e) => {
            console.error("save failed:", e);
            window.ui.alert(`儲存失敗: ${e.message || e}`);
          },
        }
      );
    });
  </script>

  <script>
    const drawerBtn = document.getElementById("drawerBtn");
    const drawer = document.getElementById("drawer");
    const backdrop = document.getElementById("drawerBackdrop");

    function openDrawer(){
      drawer.classList.add("open");
      backdrop.style.display = "block";
      document.body.style.overflow = "hidden";
    }
    function closeDrawer(){
      drawer.classList.remove("open");
      backdrop.style.display = "none";
      document.body.style.overflow = "";
    }

    drawerBtn?.addEventListener("click", openDrawer);
    backdrop?.addEventListener("click", closeDrawer);

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeDrawer();
    });
  </script>
</body>
</html>
