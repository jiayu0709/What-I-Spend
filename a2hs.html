<!doctype html>
<!--
  a2hs.html (cleaned)
  ✅ 功能不變：standalone → 進 login.html；非 Safari → 提示複製；Safari → 顯示教學
  ✅ 視覺不變：保留你原本的卡片/玻璃效果（仍是本頁專屬 CSS）
  ✅ 全站共用 UI（ui.alert / modal）交給 app.js，不再重複寫兩段 standalone 判斷
-->
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="theme.css">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="What I Spend">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f2ede9">

  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
  <title>加入主畫面</title>

  <style>
    /* ====== 本頁專屬視覺（維持你原本樣式） ====== */
    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background: var(--app-bg, #f2ede9);
      color: var(--text, #3c3c3c);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    .app{
      min-height:100vh;
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .page{
      width:100%;
      max-width:800px;
      padding:18px var(--page-padding,16px) 28px;
      display:grid;
      gap:14px;
    }

    .card{
      width: min(680px, calc(100% - 48px));
      background: var(--card-bg);
      border-radius: var(--radius, 22px);
      padding: 18px 16px;

      position: relative;
      overflow: hidden;

      border: 1px solid rgba(255,255,255,0.18);

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.10),
        inset 0 1px 0 rgba(255,255,255,0.55),
        inset 0 -1px 0 rgba(0,0,0,0.10),
        inset 0 0 0 1px rgba(255,255,255,0.12),
        0 30px 80px rgba(0,0,0,0.18),
        0 12px 26px rgba(0,0,0,0.12);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius: inherit;
      pointer-events:none;
      background:
        radial-gradient(120% 90% at 50% 0%,
          rgba(255,255,255,0.28),
          rgba(255,255,255,0.10) 35%,
          rgba(255,255,255,0.00) 70%),
        radial-gradient(120% 90% at 50% 110%,
          rgba(0,0,0,0.10),
          rgba(0,0,0,0.00) 55%);
      mix-blend-mode: soft-light;
    }

    .card::after{
      content:"";
      position:absolute;
      inset:1px;
      border-radius: calc(var(--radius, 22px) - 1px);
      pointer-events:none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.22);
      opacity: .9;
    }

    .head{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    .icon{
      width:56px;height:56px;
      border-radius:18px;
      background:rgba(255,255,255,0.6);
      display:grid;place-items:center;
      flex:0 0 auto;
      font-size:28px;
      border:1px solid rgba(0,0,0,0.08);
    }

    .ttl{
      font-weight:900;
      letter-spacing:-.5px;
      font-size:30px;
      line-height:1.1;
      margin:0;
    }

    .sub{
      margin:6px 0 0;
      color:var(--secondary, #8e8e93);
      font-weight:800;
      line-height:1.4;
      font-size:14px;
    }

    .steps{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .step{
      display:flex;
      gap:10px;
      align-items:center;
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,0.6);
      border:1px solid rgba(0,0,0,0.08);
    }

    .num{
      width:26px;height:26px;
      border-radius:9px;
      background:rgba(0,0,0,0.06);
      display:grid;place-items:center;
      font-weight:900;
      font-size:13px;
      flex:0 0 auto;
      color:var(--text, #3c3c3c);
    }

    .st{
      font-weight:900;
      font-size:14px;
      line-height:1.25;
      margin:0;
    }

    .sd{
      margin-top:2px;
      font-weight:800;
      color:var(--secondary, #8e8e93);
      font-size:12px;
      line-height:1.4;
    }

    .chip{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      background:rgba(255,255,255,0.6);
      border:1px solid rgba(0,0,0,0.08);
      font-weight:900;
      color:var(--text, #3c3c3c);
    }

    .actions{
      margin-top:14px;
      display:grid;
      gap:10px;
    }

    .btn{
      width:100%;
      padding:16px 16px;
      border-radius: var(--radius, 22px);
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      border:0;
      background: var(--card-bg, rgba(255,255,255,0.72));
      color: var(--accent-text, var(--text, #3c3c3c));
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }

    .btn.secondary{
      background: var(--accent-text);
      color:#fff;
    }

    .btn:active{ transform:scale(.99); opacity:.85; }

    .hint{
      margin-top:10px;
      font-size:12px;
      font-weight:800;
      color:var(--secondary, #8e8e93);
      line-height:1.5;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="card" id="content"></div>
  </div>

  <!-- ✅ 讓 window.ui.alert 可用（全站共用 modal/工具） -->
  <script type="module" src="app.js"></script>

  <script>
    const LOGIN_URL = "login.html";

    const isStandalone =
      window.navigator.standalone === true ||
      window.matchMedia("(display-mode: standalone)").matches;

    function isRealSafari(){
      const ua = navigator.userAgent || "";
      return /iPhone|iPad|iPod/i.test(ua)
        && /Safari/i.test(ua)
        && !/CriOS|FxiOS|EdgiOS|OPiOS|DuckDuckGo|Line|FBAN|FBAV|Instagram/i.test(ua);
    }

    // ✅ 已從主畫面打開 → 直接進 login.html（保留你原本行為）
    if (isStandalone) {
      location.replace(LOGIN_URL);
    }

    const el = document.getElementById("content");

    function renderNonSafari(){
      el.innerHTML = `
        <div class="head">
          <div class="icon">🌐</div>
          <div>
            <div class="ttl">請用 Safari 開啟</div>
            <div class="sub">才能加入主畫面</div>
          </div>
        </div>
        <p class="hint">請複製此網址，貼到 Safari 開啟後再繼續。</p>
        <div class="actions">
          <button class="btn secondary" type="button" id="copyBtn">複製目前網址</button>
        </div>
      `;

      const btn = document.getElementById("copyBtn");
      btn?.addEventListener("click", copyLink);
    }

    function renderSafariGuide(){
      el.innerHTML = `
        <div class="head">
          <div class="icon">➕</div>
          <div>
            <div class="ttl">加入主畫面</div>
            <div class="sub">像 App 一樣快速打開</div>
          </div>
        </div>

        <div class="steps">
          <div class="step">
            <div class="num">1</div>
            <div>
              <div class="st">點 Safari 的分享</div>
              <div class="sd">畫面下方 <span class="chip">□↑</span> 按鈕</div>
            </div>
          </div>
          <div class="step">
            <div class="num">2</div>
            <div>
              <div class="st">選「加入主畫面」</div>
              <div class="sd">往下滑即可看到</div>
            </div>
          </div>
          <div class="step">
            <div class="num">3</div>
            <div>
              <div class="st">加入完成</div>
              <div class="sd">之後請從桌面圖示打開</div>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn secondary" type="button" id="okBtn">我知道了</button>
        </div>
      `;

      document.getElementById("okBtn")?.addEventListener("click", () => {
        window.ui?.alert?.("加入完成後，請從桌面圖示打開");
      });
    }

    async function copyLink(){
      try{
        await navigator.clipboard.writeText(location.href);
        window.ui?.alert?.("已複製網址，請貼到 Safari 開啟");
      }catch(e){
        // iOS 有時 clipboard 失敗：給使用者提示
        window.ui?.alert?.("複製失敗，請手動長按網址列複製");
      }
    }

    // render
    if (!isRealSafari()) renderNonSafari();
    else renderSafariGuide();
  </script>
</body>
</html>
