<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="theme.css">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="What I Spend">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f2ede9">

  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
  <title>加入主畫面</title>

  <style>
    /* ====== 只改樣式：照抄 index.html 的視覺語言 ====== */
    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background: var(--app-bg, #f2ede9);
      color: var(--text, #3c3c3c);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    .app{
      min-height:100vh;
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .page{
      width:100%;
      max-width:800px;
      padding:18px var(--page-padding,16px) 28px;
      display:grid;
      gap:14px;
    }

    .card{
      width: min(680px, calc(100% - 48px));
      background: var(--card-bg);              /* ✅ 背景色維持不動 */
      border-radius: var(--radius, 22px);
      padding: 18px 16px;

      position: relative;
      overflow: hidden;

      /* ✅ 控制中心那種「曲面玻璃邊」 */
      border: 1px solid rgba(255,255,255,0.18);

      box-shadow:
        /* 外圍亮邊（像壓克力折射） */
        0 0 0 1px rgba(255,255,255,0.10),

        /* 內側高光 + 內側暗邊：產生曲面厚度 */
        inset 0 1px 0 rgba(255,255,255,0.55),
        inset 0 -1px 0 rgba(0,0,0,0.10),
        inset 0 0 0 1px rgba(255,255,255,0.12),

        /* 浮起來的柔陰影（Control Center 風格） */
        0 30px 80px rgba(0,0,0,0.18),
        0 12px 26px rgba(0,0,0,0.12);
    }

    /* ✅ 玻璃霧面高光（不改背景色，只是加一層光） */
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius: inherit;
      pointer-events:none;

      /* 上方亮、下方暗一點點，像玻璃弧面 */
      background:
        radial-gradient(120% 90% at 50% 0%,
          rgba(255,255,255,0.28),
          rgba(255,255,255,0.10) 35%,
          rgba(255,255,255,0.00) 70%),
        radial-gradient(120% 90% at 50% 110%,
          rgba(0,0,0,0.10),
          rgba(0,0,0,0.00) 55%);
      mix-blend-mode: soft-light;
    }

    /* ✅ 內圈亮邊（讓邊緣更像 iOS 那圈「玻璃厚度」） */
    .card::after{
      content:"";
      position:absolute;
      inset:1px;
      border-radius: calc(var(--radius, 22px) - 1px);
      pointer-events:none;

      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.22);
      opacity: .9;
    }

    /* Header */
    .head{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    /* 左側 icon 小卡（照 index 的玻璃白） */
    .icon{
      width:56px;height:56px;
      border-radius:18px;
      background:rgba(255,255,255,0.6);
      display:grid;place-items:center;
      flex:0 0 auto;
      font-size:28px;
      border:1px solid rgba(0,0,0,0.08);
    }

    .ttl{
      font-weight:900;
      letter-spacing:-.5px;
      font-size:30px;   /* index title 視覺更大 */
      line-height:1.1;
      margin:0;
    }

    .sub{
      margin:6px 0 0;
      color:var(--secondary, #8e8e93);
      font-weight:800;
      line-height:1.4;
      font-size:14px;   /* index subtitle */
    }

    /* Steps 區塊（照 index 的 step 卡） */
    .steps{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .step{
      display:flex;
      gap:10px;
      align-items:center;
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,0.6);
      border:1px solid rgba(0,0,0,0.08);
    }

    .num{
      width:26px;height:26px;
      border-radius:9px;
      background:rgba(0,0,0,0.06);
      display:grid;place-items:center;
      font-weight:900;
      font-size:13px;
      flex:0 0 auto;
      color:var(--text, #3c3c3c);
    }

    .st{
      font-weight:900;
      font-size:14px;
      line-height:1.25;
      margin:0;
    }

    .sd{
      margin-top:2px;
      font-weight:800;
      color:var(--secondary, #8e8e93);
      font-size:12px;
      line-height:1.4;
    }

    /* chip（照 index 的圓角小膠囊） */
    .chip{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      background:rgba(255,255,255,0.6);
      border:1px solid rgba(0,0,0,0.08);
      font-weight:900;
      color:var(--text, #3c3c3c);
    }

    .actions{
      margin-top:14px;
      display:grid;
      gap:10px;
    }

    /* 按鈕（照 index：主按鈕=accent，次按鈕=玻璃白邊框） */
    .btn{
      width:100%;
      padding:16px 16px;
      border-radius: var(--radius, 22px);
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      border:0;
      background: var(--card-bg, rgba(255,255,255,0.72));
      color: var(--accent-text, var(--text, #3c3c3c));
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }

    .btn.secondary{
      background: var(--accent-text);
      color:#fff;
    }

    .btn:active{ transform:scale(.99); opacity:.85; }

    /* hint 文字（照 index 的 note 味道） */
    .hint{
      margin-top:10px;
      font-size:12px;
      font-weight:800;
      color:var(--secondary, #8e8e93);
      line-height:1.5;
    }

  </style>
</head>

<body>
  <div class="app">
    <div class="card" id="content">
      <!-- 動態填入 -->
    </div>
  </div>

  <script>
    const isStandalone =
      window.navigator.standalone === true ||
      window.matchMedia("(display-mode: standalone)").matches;

    function isRealSafari(){
      const ua = navigator.userAgent || "";
      return /iPhone|iPad|iPod/i.test(ua)
        && /Safari/i.test(ua)
        && !/CriOS|FxiOS|EdgiOS|OPiOS|DuckDuckGo|Line|FBAN|FBAV|Instagram/i.test(ua);
    }

    // ✅ 已從主畫面打開 → 直接進 login.html
    if (isStandalone) {
      location.replace("login.html");
    }

    const el = document.getElementById("content");

    // ❌ 非 Safari
    if (!isRealSafari()) {
      el.innerHTML = `
        <div class="head">
          <div class="icon">🌐</div>
          <div>
            <div class="ttl">請用 Safari 開啟</div>
            <div class="sub">才能加入主畫面</div>
          </div>
        </div>
        <p class="hint">
          請複製此網址，貼到 Safari 開啟後再繼續。
        </p>
        <div class="actions">
          <button class="btn secondary" onclick="copyLink()">複製目前網址</button>
        </div>
      `;
    } else {
      // ✅ Safari 教學
      el.innerHTML = `
        <div class="head">
          <div class="icon">➕</div>
          <div>
            <div class="ttl">加入主畫面</div>
            <div class="sub">像 App 一樣快速打開</div>
          </div>
        </div>

        <div class="steps">
          <div class="step">
            <div class="num">1</div>
            <div>
              <div class="st">點 Safari 的分享</div>
              <div class="sd">畫面下方 <span class="chip">□↑</span> 按鈕</div>
            </div>
          </div>
          <div class="step">
            <div class="num">2</div>
            <div>
              <div class="st">選「加入主畫面」</div>
              <div class="sd">往下滑即可看到</div>
            </div>
          </div>
          <div class="step">
            <div class="num">3</div>
            <div>
              <div class="st">加入完成</div>
              <div class="sd">之後請從桌面圖示打開</div>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn secondary" onclick="window.ui.alert('加入完成後，請從桌面圖示打開');">
            我知道了
          </button>
        </div>
      `;
    }

    function copyLink(){
      navigator.clipboard.writeText(location.href);
      window.ui.alert("已複製網址，請貼到 Safari 開啟");
    }
  </script>

  <script>
  (function () {
    // iOS standalone 判斷
    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;

    // ✅ 如果是從主畫面打開（standalone），不要顯示提示頁，直接進入口
    if (isStandalone) {
      // 用 replace 避免返回鍵回到 a2hs.html
      location.replace('/login.html'); // ←改成你真正入口頁
      return;
    }

    // ✅ 如果是在 Safari 裡，才顯示「加入主畫面」提示內容
    // （你原本的 UI 照常顯示即可）
  })();
  </script>
</body>
</html>
