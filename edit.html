<!doctype html>
<html lang="zh-Hant">
<head>
  <link rel="stylesheet" href="theme.css">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>編輯明細</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;background:var(--app-bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    }
    .app{min-height:100vh;padding-bottom:18px}
    .page{max-width:520px;margin:0 auto;padding:18px var(--page-padding) 28px}
    .nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 0 6px;
    }
    .back{
      text-decoration:none;
      color: var(--accent-text);
      font-weight:800;
    }
    .title{
      font-size:34px;font-weight:900;margin:6px 0 12px;letter-spacing:-.4px;
    }
    .card{background:var(--card-bg);border-radius:var(--radius);padding:16px}
    .field{display:grid;gap:8px;margin-top:14px}
    .field:first-child{margin-top:0}
    .label{font-size:14px;font-weight:900;color:var(--secondary)}

    /* ✅ 統一所有白框（input / select / date / time）高度，並修 iOS 溢出 */
    .input,
    input,
    select {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;

      height: 52px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.12);
      background: #fff;
      font-size: 16px;
      line-height: 52px;
    }

    /* iOS 的 date/time/select 需要特殊處理 */
    input[type="date"],
    input[type="time"],
    select {
      display: block;
      appearance: none;
      -webkit-appearance: none;
    }

    /* select 用 line-height: normal，避免 iOS 裁字 */
    select {
      line-height: normal;
      padding-top: 0;
      padding-bottom: 0;
    }

    .field {
      width: 100%;
      min-width: 0;
    }

    .btnbar{margin-top:14px;display:grid;gap:10px}

    .btn{
      width:100%;
      padding:14px 16px;
      border:0;
      outline:0;
      border-radius: var(--radius);
      background: var(--btn-secondary-bg, var(--card-bg));
      color: var(--btn-secondary-text, var(--accent-text));
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      appearance:none;
      -webkit-appearance:none;
    }

    .btn.primary{
      background: var(--btn-primary-bg, var(--accent-text));
      color: var(--btn-primary-text, #fff);
    }

    .btn:active{
      opacity:.7;
      transform:scale(.98);
    }

    button, a { -webkit-tap-highlight-color: transparent; }
    .btn, .back{
      transition: background-color .15s ease, opacity .15s ease, transform .1s ease;
      user-select:none;
      -webkit-user-select:none;
    }
    .btn:active, .back:active{
      opacity:.6;
      transform:scale(.98);
    }
    .btn.primary:active{ opacity:.75; }
  </style>
</head>
<body>
  <div class="app">
    <main class="page">
      <div class="nav">
        <a class="back" id="backLink" href="month.html">‹ 返回</a>
        <div></div>
      </div>

      <div class="title">編輯明細</div>

      <div class="card">
        <div class="field">
          <div class="label">日期</div>
          <input class="input" type="date" id="date" />
        </div>

        <div class="field">
          <div class="label">時間</div>
          <input class="input" type="time" id="time" />
        </div>

        <!-- ✅ 分類改成 select（跟 add.html 一樣） -->
        <div class="field">
          <div class="label">分類</div>
          <select class="input" id="category"></select>
        </div>

        <div class="field">
          <div class="label">金額</div>
          <input class="input" type="number" id="amount" placeholder="例如：200" />
        </div>

        <div class="field">
          <div class="label">備註</div>
          <input class="input" type="text" id="note" placeholder="（可空）" />
        </div>
      </div>

      <div class="btnbar">
        <button class="btn primary" type="button" onclick="save()">儲存</button>
        <button class="btn" type="button" onclick="removeTx()">刪除</button>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>

  <script type="module">
    import { doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { db } from "./firebase-config.js";

    // 給非-module 的 <script> 呼叫
    window.saveToCloud = async (id, data) => {
      const user = await window.requireAuth();
      if (!user) throw new Error("Not logged in");

      const ref = doc(db, "users", user.uid, "transactions", id);
      await updateDoc(ref, {
        date: data.date,
        time: data.time,
        category: data.category,
        note: data.note,
        amount: Number(String(data.amount).replace(/,/g, "")),
      });
    };

    window.deleteFromCloud = async (id) => {
      const user = await window.requireAuth();
      if (!user) throw new Error("Not logged in");

      const ref = doc(db, "users", user.uid, "transactions", id);
      await deleteDoc(ref);
    };
  </script>

  <script>
    const qs = new URLSearchParams(location.search);
    const id = qs.get("id") || "tx-unknown";

    // 回上一頁（可從 ref 帶回去）
    const ref = qs.get("ref") || "month.html";
    document.getElementById("backLink").href = ref;

    // ✅ 跟 add.html 同一組分類
    const CATEGORIES = {
      expense: ["餐飲🥣","飲料🥤","交通🛵","日用🛍️","娛樂🎮","醫療🏥","治裝👗","家用🏠","旅遊🧳","其他"],
      income:  ["薪資💼","獎金🎁","兼職🧑‍💻","投資📈","退款↩︎","其他"],
    };

    const categorySelect = document.getElementById("category");

    function renderCategoryOptions(type, currentValue){
      const list = (type === "income") ? CATEGORIES.income : CATEGORIES.expense;

      categorySelect.innerHTML = "";
      for (const name of list) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        categorySelect.appendChild(opt);
      }

      // 如果目前分類不在預設清單，額外塞一個，避免原資料消失
      const cur = (currentValue || "").trim();
      if (cur && !list.includes(cur)) {
        const opt = document.createElement("option");
        opt.value = cur;
        opt.textContent = cur;
        categorySelect.insertBefore(opt, categorySelect.firstChild);
      }

      categorySelect.value = cur ? cur : list[0];
    }

    function init(){
      const saved = localStorage.getItem("tx:"+id);
      let data = null;

      if(saved){
        try{ data = JSON.parse(saved); }catch(e){}
      }else{
        data = {
          id,
          date: qs.get("date") || "",
          time: qs.get("time") || "",
          category: qs.get("cat") || "",
          note: qs.get("note") || "",
          amount: qs.get("amount") || "",
          type: qs.get("type") || "" // 可能會有
        };
      }

      // ✅ 推斷 type：如果 querystring / localStorage 有 income 就用 income，否則 expense
      const typeGuess = (data?.type === "income" || qs.get("type") === "income") ? "income" : "expense";
      renderCategoryOptions(typeGuess, data.category || "");

      document.getElementById("date").value = data.date || "";
      document.getElementById("time").value = data.time || "";
      document.getElementById("note").value = data.note || "";
      document.getElementById("amount").value = data.amount || "";
    }

    async function save(){
      const data = {
        id,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        category: (categorySelect.value || "").trim(),
        note: document.getElementById("note").value.trim(),
        amount: document.getElementById("amount").value
      };

      const amt = Number(String(data.amount).replace(/,/g,""));
      if(!isFinite(amt) || amt <= 0){
        alert("請輸入正確金額（> 0）");
        return;
      }

      if(!data.category){
        alert("請選擇分類");
        return;
      }

      // 先存本機（保留你原本邏輯）
      localStorage.setItem("tx:"+id, JSON.stringify(data));

      try {
        // ✅ 存雲端
        await window.saveToCloud(id, data);
      } catch (e) {
        console.error("saveToCloud failed:", e);
        alert("儲存失敗（雲端）：\n" + (e.code || "") + "\n" + (e.message || String(e)));
        return;
      }

      location.href = ref;
    }

    async function removeTx(){
      localStorage.removeItem("tx:"+id);
      localStorage.setItem("tx:deleted:"+id, "1");

      try {
        await window.deleteFromCloud(id);
      } catch (e) {
        console.error("deleteFromCloud failed:", e);
        alert("刪除失敗（雲端）：" + (e.message || e));
        return;
      }

      location.href = ref;
    }

    init();
  </script>

  <script>
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', e => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#')) return;

        e.preventDefault();

        const page = document.querySelector('.page');
        if (!page) {
          location.href = href;
          return;
        }

        page.classList.add('leaving');

        setTimeout(() => {
          location.href = href;
        }, 200);
      });
    });
  </script>
</body>
</html>
