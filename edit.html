<!doctype html>
<!--
  edit.html (cleaned)
  ✅ 功能不變、畫面不變
  ✅ 全站共用（nav/tabbar/drawer/modal/page transition/input colors...）交給 theme.css + app.js
  ✅ 本頁只保留「編輯頁專屬」：表單版面、btnbar、欄位統一高度/置中
  ✅ 分類清單仍用你原本的 CATEGORIES（不改行為）
-->
<html lang="zh-Hant">
<head>
  <link rel="stylesheet" href="theme.css">
  <meta name="page" content="edit">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>編輯明細</title>

  <style>
    /* ✅ edit.html 本頁專屬（其餘交給 theme.css） */
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    }

    .app{min-height:100vh;padding-bottom:18px}
    .page{max-width:520px;margin:0 auto;padding:18px var(--page-padding) 28px}

    /* ✅ 返回列：沿用你原本「返回」需求（不走全站抽屜） */
    .back{
      text-decoration:none;
      color: var(--accent-text);
      font-weight:800;
    }

    .card{background:var(--card-bg);border-radius:var(--radius);padding:16px}
    .field{display:grid;gap:8px;margin-top:14px;min-width:0}
    .field:first-child{margin-top:0}
    .label{font-size:14px;font-weight:900;color:var(--secondary)}

    /* ✅ 統一白框高度 + iOS 溢出處理（維持你現在效果） */
    .input,
    input,
    select{
      width:100%;
      max-width:100%;
      box-sizing:border-box;

      height:52px;
      padding:0 12px;
      border-radius:10px;
      border:1px solid rgba(0,0,0,0.12);
      background:#fff;
      font-size:16px;
      line-height:52px;
    }

    input[type="date"],
    input[type="time"],
    select{
      display:block;
      appearance:none;
      -webkit-appearance:none;
    }

    /* select 用 normal 避免 iOS 裁字 */
    select{
      line-height:normal;
      padding-top:0;
      padding-bottom:0;
      text-align:center;
      text-align-last:center; /* iOS/Safari：選到的那行置中 */
      padding-left:12px;
      padding-right:12px;
    }
    select option{ text-align:center; }

    /* ✅ 你要的：內容置中 + 套用主題色 */
    .input,
    input,
    select{
      text-align:center;
      color: var(--accent-text);
      -webkit-text-fill-color: var(--accent-text);
    }

    input[type="date"]::-webkit-datetime-edit,
    input[type="time"]::-webkit-datetime-edit{
      text-align:center;
      color: var(--accent-text);
      -webkit-text-fill-color: var(--accent-text);
    }
    input[type="date"]::-webkit-datetime-edit-text,
    input[type="date"]::-webkit-datetime-edit-month-field,
    input[type="date"]::-webkit-datetime-edit-day-field,
    input[type="date"]::-webkit-datetime-edit-year-field,
    input[type="time"]::-webkit-datetime-edit-text,
    input[type="time"]::-webkit-datetime-edit-hour-field,
    input[type="time"]::-webkit-datetime-edit-minute-field,
    input[type="time"]::-webkit-datetime-edit-ampm-field{
      color: var(--accent-text);
      -webkit-text-fill-color: var(--accent-text);
    }
    select option{ color: var(--accent-text); }

    .btnbar{margin-top:14px;display:grid;gap:10px}

    /* ✅ 按鈕（維持你原本視覺/互動） */
    .btn{
      width:100%;
      padding:14px 16px;
      border:0;
      outline:0;
      border-radius: var(--radius);
      background: var(--btn-secondary-bg, var(--card-bg));
      color: var(--btn-secondary-text, var(--accent-text));
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      appearance:none;
      -webkit-appearance:none;
    }
    .btn.primary{
      background: var(--btn-primary-bg, var(--accent-text));
      color: var(--btn-primary-text, #fff);
    }
    .btn:active{opacity:.7;transform:scale(.98)}

    /* link/button tap feedback（避免重複寫太多，全站也有，但這裡保留不改行為） */
    a, button{ -webkit-tap-highlight-color: transparent; }
    .btn, .back{
      transition: background-color .15s ease, opacity .15s ease, transform .1s ease;
      user-select:none;
      -webkit-user-select:none;
    }
    .back:active{opacity:.6;transform:scale(.98)}
    .btn.primary:active{opacity:.75}
  </style>
</head>

<body>
  <div class="app">
    <main class="page">
      <div class="nav">
        <div class="nav-left">
          <a class="back" id="backLink" href="month.html">‹ 返回</a>
        </div>
        <div class="nav-title">編輯明細</div>
        <div class="nav-right">
          <div class="book-badge" id="bookBadge" style="display:none;"></div>
        </div>
      </div>

      <div class="card">
        <div class="field">
          <div class="label">日期</div>
          <input class="input" type="date" id="date" />
        </div>

        <div class="field">
          <div class="label">時間</div>
          <input class="input" type="time" id="time" />
        </div>

        <div class="field">
          <div class="label">分類</div>
          <select class="input" id="category"></select>
        </div>

        <div class="field">
          <div class="label">金額</div>
          <input class="input" type="number" id="amount" placeholder="例如：200" />
        </div>

        <div class="field">
          <div class="label">備註</div>
          <input class="input" type="text" id="note" placeholder="（可空）" />
        </div>
      </div>

      <div class="btnbar">
        <button class="btn primary" id="saveBtn" type="button">儲存</button>
        <button class="btn" type="button" id="deleteBtn">刪除</button>
      </div>
    </main>
  </div>

  <!-- ✅ 全站共用：drawer / badge / modal / button feedback / auth helpers -->
  <script type="module" src="app.js"></script>

  <!-- ✅ Cloud ops：提供給非-module script 呼叫（行為不變） -->
  <script type="module">
    import { doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { db } from "./firebase-config.js";

    window.saveToCloud = async (id, data) => {
      const user = await window.requireAuth();
      if (!user) throw new Error("Not logged in");

      const ref = doc(db, "users", user.uid, "transactions", id);
      await updateDoc(ref, {
        date: data.date,
        time: data.time,
        category: data.category,
        note: data.note,
        amount: Number(String(data.amount).replace(/,/g, "")),
      });
    };

    window.deleteFromCloud = async (id) => {
      const user = await window.requireAuth();
      if (!user) throw new Error("Not logged in");

      const ref = doc(db, "users", user.uid, "transactions", id);
      await deleteDoc(ref);
    };
  </script>

  <script>
    const qs = new URLSearchParams(location.search);
    const id = qs.get("id") || "tx-unknown";

    // 回上一頁（可從 ref 帶回去）
    const ref = qs.get("ref") || "month.html";
    const backLink = document.getElementById("backLink");
    if (backLink) backLink.href = ref;

    // ✅ 分類清單（保留你原本行為：固定清單 + 若原值不在清單就插入保留）
    const CATEGORIES = ["餐飲🥣","飲料🥤","交通🛵","日用🛍️","娛樂🎮","醫療🏥","治裝👗","家用🏠","旅遊🧳","其他"];

    const els = {
      date: document.getElementById("date"),
      time: document.getElementById("time"),
      category: document.getElementById("category"),
      note: document.getElementById("note"),
      amount: document.getElementById("amount"),
      saveBtn: document.getElementById("saveBtn"),
      deleteBtn: document.getElementById("deleteBtn"),
    };

    function renderCategoryOptions(currentValue){
      const sel = els.category;
      if (!sel) return;

      sel.innerHTML = "";
      for (const name of CATEGORIES) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      }

      const cur = (currentValue || "").trim();

      // 若原本分類不在清單裡：加一個 option 保留原值
      if (cur && !CATEGORIES.includes(cur)) {
        const opt = document.createElement("option");
        opt.value = cur;
        opt.textContent = cur;
        sel.insertBefore(opt, sel.firstChild);
      }

      sel.value = cur || CATEGORIES[0];
    }

    function init(){
      const saved = localStorage.getItem("tx:" + id);
      let data = null;

      if (saved) {
        try { data = JSON.parse(saved); } catch {}
      }

      if (!data) {
        // 沒存過就用 query 當初始值
        data = {
          id,
          date: qs.get("date") || "",
          time: qs.get("time") || "",
          category: qs.get("cat") || "",
          note: qs.get("note") || "",
          amount: qs.get("amount") || "",
        };
      }

      if (els.date) els.date.value = data.date || "";
      if (els.time) els.time.value = data.time || "";

      renderCategoryOptions(data.category || "");
      if (els.category) els.category.value = (data.category || "").trim() || CATEGORIES[0];

      if (els.note) els.note.value = data.note || "";
      if (els.amount) els.amount.value = data.amount || "";
    }

    async function save(){
      const data = {
        id,
        date: els.date?.value || "",
        time: els.time?.value || "",
        category: (els.category?.value || "").trim(),
        note: (els.note?.value || "").trim(),
        amount: els.amount?.value || "",
      };

      const amt = Number(String(data.amount).replace(/,/g, ""));
      if (!isFinite(amt) || amt <= 0) {
        window.ui.alert("請輸入正確金額（> 0）");
        return;
      }

      // 先存本機（保留原本行為）
      localStorage.setItem("tx:" + id, JSON.stringify(data));

      try {
        await window.saveToCloud(id, data);
      } catch (e) {
        console.error("saveToCloud failed:", e);
        window.ui.alert("儲存失敗（雲端）：\n" + (e.code || "") + "\n" + (e.message || String(e)));
        return;
      }

      location.href = ref;
    }

    async function removeTx(){
      // 先刪本機（保留原本行為）
      localStorage.removeItem("tx:" + id);
      localStorage.setItem("tx:deleted:" + id, "1");

      try {
        await window.deleteFromCloud(id);
      } catch (e) {
        console.error("deleteFromCloud failed:", e);
        window.ui.alert("刪除失敗（雲端）：" + (e.message || e));
        return;
      }

      location.href = ref;
    }

    init();

    if (els.saveBtn) {
      els.saveBtn.addEventListener("click", async () => {
        await window.withButtonFeedback(
          els.saveBtn,
          async () => { await save(); },
          {
            loadingText: "儲存中…",
            successText: "已儲存 ✓",
            minShowMs: 120,
            onError: (e) => window.ui.alert("儲存失敗：" + (e.message || e)),
          }
        );
      });
    }

    if (els.deleteBtn) {
      els.deleteBtn.addEventListener("click", async () => {
        const ok = await window.ui.confirm("確定要刪除這筆明細嗎？", { danger: true });
        if (!ok) return;
        await removeTx();
      });
    }

    // ✅ 保留你原本的 a 轉場（不影響功能）
    document.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", (e) => {
        const href = link.getAttribute("href");
        if (!href || href.startsWith("#")) return;

        e.preventDefault();

        const page = document.querySelector(".page");
        if (!page) { location.href = href; return; }

        page.classList.add("leaving");
        setTimeout(() => { location.href = href; }, 200);
      });
    });
  </script>
</body>
</html>
